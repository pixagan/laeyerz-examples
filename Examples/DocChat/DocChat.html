<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DocChat</title>
  <style>
    :root {
      --gap: 12px;
      --accent: #16a34a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #ffffff;
      --danger: #dc2626;
    }
    html, body {
      height: 100%;
    }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: #f8fafc;
      color: #0f172a;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    .error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 8px;
    }
    .loading {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .spinner {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(37,99,235,0.2);
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    small.hint { color: var(--muted); display: block; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="container" role="region" aria-label="DocChat">
    <header class="header">
      <div class="title">
        <h1>DocChat</h1>
        <p class="subtitle">Upload a document on the left, chat on the right.</p>
      </div>
      <div class="actions">
        <button id="loadHistoryBtn" class="btn btn-secondary" type="button">Load history</button>
      </div>
    </header>

    <main class="split">
      <section class="panel" aria-label="Document panel">
        <div class="panelHeader">
          <h2>Document</h2>
        </div>

        <div class="uploadBar">
          <input id="fileInput" type="file" accept=".pdf,.doc,.docx,.txt" />
          <button id="uploadBtn" class="btn" type="button">Upload</button>
        </div>
        <small id="selectedFileHint" class="hint"></small>
        <div id="uploadStatus" class="loading" style="display:none;">
          <span class="spinner" aria-hidden="true"></span>
          <span id="uploadStatusText">Uploading…</span>
        </div>
        <div id="uploadError" class="error" style="display:none;"></div>

        <hr class="sep" />

        <div class="scroll">
          <h3 id="docTitle">Document pages</h3>
          <div id="docPages" class="docPages"></div>
        </div>
      </section>

      <section class="panel" aria-label="Chat panel">
        <div class="panelHeader">
          <h2>Chat</h2>
        </div>

        <div class="chatComposer">
          <textarea id="queryInput" rows="5" placeholder="Enter your question"></textarea>
          <button id="chatBtn" class="btn" type="button">Chat</button>
        </div>
        <div id="chatStatus" class="loading" style="display:none;">
          <span class="spinner" aria-hidden="true"></span>
          <span id="chatStatusText">Thinking…</span>
        </div>
        <div id="chatError" class="error" style="display:none;"></div>

        <hr class="sep" />

        <div class="scroll">
          <div id="chatHistory" class="chatHistory"></div>
        </div>
      </section>
    </main>
  </div>

  <style>
    * { box-sizing: border-box; }
    .container {
      max-width: none;
      margin: 0;
      padding: 18px 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--gap);
      margin-bottom: 14px;
      flex: 0 0 auto;
    }
    .title h1 { margin: 0; font-size: 20px; }
    .subtitle { margin: 4px 0 0 0; color: var(--muted); font-size: 13px; }
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
      align-items: stretch;
      flex: 1 1 auto;
      min-height: 0;
    }
    @media (max-width: 980px) {
      .split { grid-template-columns: 1fr; }
    }
    .panel {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .panelHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--gap);
      margin-bottom: 10px;
    }
    .panelHeader h2 { margin: 0; font-size: 16px; }
    .uploadBar {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    input[type="file"] {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      background: #fff;
    }
    .btn {
      border: 1px solid rgba(22,163,74,0.25);
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn.btn-secondary {
      background: #111827;
      border-color: rgba(17,24,39,0.2);
    }
    .sep {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 14px 0;
    }
    .scroll {
      flex: 1;
      overflow: auto;
      padding-right: 0;
      width: 100%;
      min-height: 0;
    }
    #docTitle { margin: 0 0 10px 0; font-size: 14px; color: #111827; }
    .docPages { width: 100%; }
    .docPages p {
      margin: 0 0 10px 0;
      line-height: 1.45;
      font-size: 14px;
      white-space: pre-wrap;
      width: 100%;
    }
    .chatComposer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
    }
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      resize: vertical;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.4;
    }
    .chatHistory {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chatCard {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }
    .chatCardHeader {
      padding: 10px 12px;
      background: #f9fafb;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 14px;
      white-space: pre-wrap;
    }
    .chatCardBody {
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.45;
    }
    .chatCardBody p { margin: 0 0 8px 0; white-space: pre-wrap; }
    .chatCardBody p:last-child { margin-bottom: 0; }
  </style>

  <script>
    // Backend base URL (hardcode where your FastAPI is hosted).
    // Examples:
    // - "" (same origin)
    // - "http://localhost:6031"
    // - "https://my-backend.example.com"
    const backendUrl = "http://localhost:6031";

    function apiUrl(path) {
      const base = String(backendUrl || "").replace(/\/+$/, "");
      const p = String(path || "").replace(/^\/+/, "");
      return base ? `${base}/${p}` : `/${p}`;
    }

    // Minimal "state"
    let selectedFile = null;
    let fileName = "";
    let docPages = [];
    let chatHistory = [];

    // Elements
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const selectedFileHint = document.getElementById("selectedFileHint");
    const uploadStatus = document.getElementById("uploadStatus");
    const uploadStatusText = document.getElementById("uploadStatusText");
    const uploadError = document.getElementById("uploadError");
    const docPagesEl = document.getElementById("docPages");

    const queryInput = document.getElementById("queryInput");
    const chatBtn = document.getElementById("chatBtn");
    const chatStatus = document.getElementById("chatStatus");
    const chatStatusText = document.getElementById("chatStatusText");
    const chatError = document.getElementById("chatError");
    const chatHistoryEl = document.getElementById("chatHistory");

    const loadHistoryBtn = document.getElementById("loadHistoryBtn");

    function setVisible(el, visible) {
      el.style.display = visible ? "" : "none";
    }

    function setText(el, text) {
      el.textContent = text || "";
    }

    function escapeText(s) {
      return String(s ?? "");
    }

    function normalizeDocPages(pages) {
      if (!Array.isArray(pages)) return [];
      return pages.map((p) => {
        if (p && typeof p === "object" && "content" in p) return { content: escapeText(p.content) };
        return { content: escapeText(p) };
      });
    }

    function responseToLines(response) {
      if (response == null) return [];
      if (typeof response === "string") return [response];
      if (Array.isArray(response)) return response.map((v) => escapeText(v));
      if (typeof response === "object") return Object.values(response).map((v) => escapeText(v));
      return [escapeText(response)];
    }

    function renderDocPages() {
      docPagesEl.innerHTML = "";
      if (!docPages.length) {
        const p = document.createElement("p");
        p.style.color = "var(--muted)";
        p.textContent = "No document loaded yet. Upload a file to see extracted pages here.";
        docPagesEl.appendChild(p);
        return;
      }

      for (let i = 0; i < docPages.length; i++) {
        const page = docPages[i];
        const p = document.createElement("p");
        p.textContent = page.content || "";
        docPagesEl.appendChild(p);
      }
    }

    function renderChatHistory() {
      chatHistoryEl.innerHTML = "";
      if (!chatHistory.length) {
        const p = document.createElement("p");
        p.style.color = "var(--muted)";
        p.textContent = "Ask a question to start chatting.";
        chatHistoryEl.appendChild(p);
        return;
      }

      for (let i = 0; i < chatHistory.length; i++) {
        const item = chatHistory[i] || {};
        const card = document.createElement("div");
        card.className = "chatCard";

        const header = document.createElement("div");
        header.className = "chatCardHeader";
        header.textContent = escapeText(item.query);

        const body = document.createElement("div");
        body.className = "chatCardBody";

        const lines = responseToLines(item.response);
        if (!lines.length) {
          const p = document.createElement("p");
          p.style.color = "var(--muted)";
          p.textContent = "(No response)";
          body.appendChild(p);
        } else {
          for (let j = 0; j < lines.length; j++) {
            const p = document.createElement("p");
            p.textContent = lines[j];
            body.appendChild(p);
          }
        }

        card.appendChild(header);
        card.appendChild(body);
        chatHistoryEl.appendChild(card);
      }
    }

    async function uploadDocument() {
      if (!selectedFile) return;

      setVisible(uploadError, false);
      setVisible(uploadStatus, true);
      setText(uploadStatusText, "Uploading…");
      uploadBtn.disabled = true;

      try {
        const formData = new FormData();
        formData.append("file", selectedFile); // must be 'file' to match backend

        const storeResp = await fetch(apiUrl("/api/store"), {
          method: "POST",
          body: formData,
        });

        if (!storeResp.ok) {
          const msg = await storeResp.text();
          throw new Error(msg || `Upload failed (${storeResp.status})`);
        }

        setText(uploadStatusText, "Loading extracted pages…");
        const docResp = await fetch(apiUrl("/api/document"));
        if (!docResp.ok) {
          const msg = await docResp.text();
          throw new Error(msg || `Document fetch failed (${docResp.status})`);
        }
        const data = await docResp.json();
        docPages = normalizeDocPages(data.doc_pages);
        renderDocPages();
      } catch (err) {
        setText(uploadError, err?.message || String(err));
        setVisible(uploadError, true);
      } finally {
        setVisible(uploadStatus, false);
        uploadBtn.disabled = false;
      }
    }

    async function chatRequest() {
      const query = (queryInput.value || "").trim();
      if (!query) return;

      setVisible(chatError, false);
      setVisible(chatStatus, true);
      setText(chatStatusText, "Thinking…");
      chatBtn.disabled = true;

      try {
        const resp = await fetch(apiUrl("/api/chat"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query }),
        });
        if (!resp.ok) {
          const msg = await resp.text();
          throw new Error(msg || `Chat failed (${resp.status})`);
        }
        const data = await resp.json();
        const answer = data.chat_response;

        chatHistory = [{ query, response: answer }, ...chatHistory];
        renderChatHistory();
        queryInput.value = "";
      } catch (err) {
        setText(chatError, err?.message || String(err));
        setVisible(chatError, true);
      } finally {
        setVisible(chatStatus, false);
        chatBtn.disabled = false;
      }
    }

    async function loadHistory() {
      setVisible(chatError, false);
      setVisible(chatStatus, true);
      setText(chatStatusText, "Loading history…");
      loadHistoryBtn.disabled = true;

      try {
        const resp = await fetch(apiUrl("/api/history"));
        if (!resp.ok) {
          const msg = await resp.text();
          throw new Error(msg || `History load failed (${resp.status})`);
        }
        const data = await resp.json();
        chatHistory = Array.isArray(data.chats) ? data.chats : [];
        renderChatHistory();
      } catch (err) {
        setText(chatError, err?.message || String(err));
        setVisible(chatError, true);
      } finally {
        setVisible(chatStatus, false);
        loadHistoryBtn.disabled = false;
      }
    }

    // Wire up events
    fileInput.addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0] ? e.target.files[0] : null;
      selectedFile = file;
      fileName = file ? file.name : "";
      setText(selectedFileHint, fileName ? `Selected: ${fileName}` : "");
    });

    uploadBtn.addEventListener("click", uploadDocument);
    chatBtn.addEventListener("click", chatRequest);
    loadHistoryBtn.addEventListener("click", loadHistory);

    queryInput.addEventListener("keydown", (e) => {
      // Enter submits, Shift+Enter adds newline
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        chatRequest();
      }
    });

    // Initial render
    renderDocPages();
    renderChatHistory();
  </script>
</body>
</html>
